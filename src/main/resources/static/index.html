<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment</title>
    <style>
        body { font-family: sans-serif; max-width: 480px; margin: 80px auto; padding: 0 20px; }
        h1 { font-size: 1.4rem; margin-bottom: 24px; }
        label { display: block; margin-bottom: 4px; font-size: 0.9rem; color: #444; }
        input, select { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #635bff; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #4f49cc; }
        .error { color: red; font-size: 0.85rem; margin-top: -12px; margin-bottom: 12px; display: none; }
    </style>
</head>
<body>
    <h1>Make a Payment</h1>
    <form id="paymentForm">
        <label for="amount">Amount</label>
        <input type="number" id="amount" name="amount" placeholder="10.00" min="0.50" step="0.01" required>
        <div class="error" id="amountError">Minimum amount is €0.50.</div>

        <label>Currency</label>
        <input type="text" value="EUR" disabled>

        <button type="submit" id="submitBtn">Pay</button>
    </form>

    <script>
        document.getElementById('paymentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            const amount = parseFloat(document.getElementById('amount').value);

            if (isNaN(amount) || amount < 0.50) {
                document.getElementById('amountError').style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Pay';
                return;
            }
            document.getElementById('amountError').style.display = 'none';

            const response = await fetch('/api/payments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount })
            });

            if (response.ok) {
                const data = await response.json();
                window.location.href = '/processing.html?id=' + data.id;
            } else {
                btn.disabled = false;
                btn.textContent = 'Pay';
                alert('Failed to initiate payment. Please try again.');
            }
        });
    </script>
</body>
</html>
